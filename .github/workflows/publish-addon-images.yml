name: publish addon images

on:
  workflow_dispatch:
    inputs:
      version:
        description: Add-on version/tag (for example 0.2.18)
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - name: Validate addon config version
        run: |
          addon_version=$(jq -r '.version' clawdbot_gateway/config.json)
          if [ "${addon_version}" != "${VERSION}" ]; then
            echo "Version mismatch: config.json=${addon_version}, workflow=${VERSION}" >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v6
        with:
          context: ./clawdbot_gateway
          file: ./clawdbot_gateway/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-clawdbot-gateway:${{ env.VERSION }}
